<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1" name="viewport"/><meta content="noai,noimageai" name="robots"/><title>大智度論 · 卷十三 · 十品彙整 · 尸羅波羅蜜戒學全圖</title><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&amp;family=Noto+Sans+TC:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/><style>
:root{
  --bg:#f7f3ec; --text:#2c2416; --text2:#5a4e3a; --text-muted:#6B5B4B;
  --accent:#8b5e3c; --accentL:#c4956a; --accent-red:#8B2500;
  --gold:#b8860b; --goldL:#d4a84b; --gold-light:#C9A84C;
  --border:#d4c4a8; --border-light:#EDE8E0; --card:#fffdf7;
  --verseBg:#f0e8d8; --verseBd:#c4956a;
  --sbW:76px; --sbBg:#1e1a14; --sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px; --primary:#2C1810; --primary-light:#5B3A29;
  --shadow:rgba(91,58,41,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{scrollbar-width:none;-ms-overflow-style:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
html,body{
  -webkit-user-select:none!important;-moz-user-select:none!important;
  -ms-user-select:none!important;user-select:none!important;
  -webkit-touch-callout:none!important;
}
*{-webkit-user-drag:none!important;}
body{
  font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  background:var(--bg);color:var(--text);
  font-size:20px;line-height:1.85;
  overflow-x:hidden;
}

/* === Sidebar === */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;width:0;}
.sb-brand{position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;font-size:11px;letter-spacing:2px;
  color:var(--gold);text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;
  transition:color .25s,background .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;
  letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;padding:6px 0;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:4px;
  text-decoration:none;color:var(--sbText);
  padding:6px 4px;width:90%;border-radius:6px;
  transition:all .25s;cursor:pointer;}
.sb-item:hover{background:rgba(184,134,11,.15);}
.sb-item.active{background:linear-gradient(135deg,#3d2f1f,#5a4530);box-shadow:0 0 12px rgba(184,134,11,.4);}
.sb-circle{width:34px;height:34px;border-radius:50%;
  background:rgba(184,134,11,.18);color:var(--gold);
  font-family:"Noto Sans TC",sans-serif;font-weight:700;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(184,134,11,.4);}
.sb-item.active .sb-circle{background:var(--gold);color:#fff;}
.sb-label{font-size:11px;letter-spacing:1px;color:var(--sbText);writing-mode:horizontal-tb;text-align:center;line-height:1.2;}

#sbToggle{display:none;position:fixed;top:14px;left:14px;z-index:200;
  width:42px;height:42px;border-radius:50%;border:0;
  background:var(--sbBg);color:var(--gold);font-size:22px;cursor:pointer;
  box-shadow:0 2px 12px rgba(0,0,0,.3);}

/* === Main === */
.main{margin-left:var(--sbW);min-height:100vh;}

/* === Hero === */
.site-hero{
  background:var(--headGrad);
  color:#fff;padding:80px 30px 70px;text-align:center;
  position:relative;overflow:hidden;
}
.site-hero::before{
  content:"尸羅";position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  font-size:280px;color:rgba(212,168,75,0.04);
  font-weight:900;letter-spacing:30px;pointer-events:none;
  font-family:"Noto Serif TC",serif;
}
.hero-meta{font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:6px;
  color:var(--goldL);opacity:.78;margin-bottom:14px;position:relative;}
.hero-title{font-size:56px;font-weight:900;letter-spacing:8px;
  color:#fff;margin-bottom:10px;position:relative;
  text-shadow:0 2px 10px rgba(0,0,0,.4);}
.hero-subtitle{font-family:"Noto Sans TC",sans-serif;font-size:20px;
  color:var(--goldL);font-weight:300;letter-spacing:8px;margin-bottom:18px;position:relative;}
.hero-sub{font-size:18px;color:#e8d8b8;line-height:1.9;
  max-width:760px;margin:0 auto;font-style:normal;position:relative;}
.hero-range{font-family:"Noto Sans TC",sans-serif;font-size:13px;
  color:rgba(212,168,75,.85);letter-spacing:3px;margin-top:22px;position:relative;}
.hero-deco{display:flex;justify-content:center;align-items:center;gap:18px;
  margin-top:24px;position:relative;}
.hero-deco .line{width:80px;height:1px;background:var(--gold);opacity:.6;}
.hero-deco .dot{width:8px;height:8px;border-radius:50%;background:var(--goldL);}

/* === Preface === */
.preface{max-width:920px;margin:50px auto 30px;padding:34px 40px;
  background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--border);border-left:5px solid var(--gold);
  border-radius:14px;box-shadow:0 4px 20px rgba(91,58,41,.08);}
.preface-title{font-family:"Noto Sans TC",sans-serif;font-size:30px;
  font-weight:700;color:var(--accent);letter-spacing:4px;
  text-align:center;margin-bottom:18px;}
.preface-title::after{content:"";display:block;width:60px;height:2px;
  background:var(--gold);margin:10px auto 0;}
.preface p{font-size:18.5px;line-height:2.1;color:var(--text2);
  margin-bottom:12px;text-indent:2em;}

/* === TOC === */
.toc-section{max-width:1100px;margin:30px auto 50px;padding:0 30px;}
.toc-title{font-family:"Noto Sans TC",sans-serif;font-size:34px;
  font-weight:700;color:var(--accent);letter-spacing:8px;
  text-align:center;margin-bottom:8px;}
.toc-title::after{content:"";display:block;width:80px;height:2px;
  background:var(--gold);margin:14px auto 0;}
.toc-desc{font-family:"Noto Sans TC",sans-serif;font-size:14px;
  color:var(--text-muted);letter-spacing:4px;text-align:center;
  margin-bottom:30px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:18px;}
.toc-card{background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:20px 22px;
  display:flex;gap:16px;align-items:flex-start;
  text-decoration:none;color:var(--text);
  transition:all .25s;cursor:pointer;
  box-shadow:0 1px 4px rgba(91,58,41,.06);}
.toc-card:hover{transform:translateY(-2px);
  box-shadow:0 6px 18px rgba(91,58,41,.16);border-color:var(--gold);}
.toc-num{width:46px;height:46px;border-radius:50%;
  background:var(--gold);color:#fff;flex-shrink:0;
  font-family:"Noto Sans TC",sans-serif;font-weight:700;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(184,134,11,.4);}
.toc-name{font-size:19.5px;font-weight:600;color:var(--text);
  line-height:1.6;letter-spacing:1px;}
.toc-sub{font-family:"Noto Sans TC",sans-serif;font-size:13px;
  color:var(--text-muted);margin-top:4px;letter-spacing:1px;line-height:1.5;}

/* === Chapter === */
.chapter{margin:0 auto;max-width:100%;}
.ch-head{
  background:var(--headGrad);color:#fff;
  padding:50px 30px 44px;text-align:center;position:relative;
}
.ch-head::after{content:"";display:block;width:120px;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:22px auto 0;}
.ch-num{font-family:"Noto Sans TC",sans-serif;font-size:18px;
  color:var(--goldL);letter-spacing:6px;margin-bottom:14px;opacity:.9;}
.ch-name{font-size:34px;font-weight:700;letter-spacing:6px;
  color:#fff;margin-bottom:14px;text-shadow:0 2px 8px rgba(0,0,0,.4);}
.ch-sub{font-family:"Noto Sans TC",sans-serif;font-size:17px;
  color:#e8d8b8;letter-spacing:3px;line-height:1.7;
  max-width:780px;margin:0 auto;}

.ch-body{max-width:980px;margin:0 auto;padding:42px 36px 60px;
  background:var(--bg);}
.ch-body h2{font-size:30px;font-weight:700;color:var(--accent);
  margin:36px 0 18px;padding:10px 0 10px 20px;
  border-left:4px solid var(--gold);
  background:linear-gradient(90deg,rgba(184,134,11,.08),transparent 60%);
  letter-spacing:3px;}
.ch-body h3{font-size:23.5px;font-weight:600;color:var(--text);
  margin:28px 0 12px;padding-bottom:8px;
  border-bottom:1px solid var(--border-light);letter-spacing:2px;}
.ch-body h4{font-size:20px;font-weight:600;color:var(--text2);
  margin:22px 0 10px;letter-spacing:1.5px;}
.ch-body h5{font-size:18.5px;font-weight:600;color:var(--accent);
  margin:16px 0 8px;letter-spacing:1px;}
.ch-body p{margin:0 0 14px;font-size:20px;line-height:1.9;color:var(--text);}
.ch-body p.indent{text-indent:2em;}
.ch-body strong,.ch-body b{color:var(--accent-red);font-weight:700;}

/* === Classical text & verse === */
.classical-text{background:#FFFDF5;border:1px solid #E8E0D0;
  border-radius:10px;padding:20px 26px;margin:18px 0;
  line-height:2.0;font-size:21px;position:relative;}
.text-label{display:inline-block;background:#2c2416;color:#fff;
  font-family:"Noto Sans TC",sans-serif;font-size:13.5px;
  padding:3px 14px;border-radius:14px;letter-spacing:3px;
  margin-bottom:12px;}

.verse,.gatha{background:var(--verseBg);border-left:4px solid var(--verseBd);
  padding:18px 30px;margin:18px 0;
  white-space:normal;font-size:22px;line-height:2.2;
  text-align:center;font-style:normal;color:var(--text);
  border-radius:0 8px 8px 0;font-weight:500;}
.verse::before,.gatha::before{content:"〈";color:var(--gold);font-size:24px;margin-right:6px;}
.verse::after,.gatha::after{content:"〉";color:var(--gold);font-size:24px;margin-left:6px;}

.qa{margin:18px 0;}
.qa .q{background:#eff4fa;border-left:3px solid #5b7a9f;
  padding:14px 22px;color:#324d6b;border-radius:0 8px 8px 0;
  font-size:20px;line-height:1.9;}
.qa .a{padding:14px 22px;color:var(--text);
  background:#fcf8f0;border-left:3px solid var(--accent);
  border-radius:0 8px 8px 0;margin-top:6px;font-size:20px;line-height:1.9;}

/* === Cards === */
.card,.insight,.commentary,.practice,.note{
  background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:18px 24px;margin:16px 0;
  box-shadow:0 1px 3px rgba(91,58,41,.06);}
.card-title{font-family:"Noto Sans TC",sans-serif;font-size:21.5px;
  font-weight:700;color:var(--accent);margin-bottom:10px;letter-spacing:2px;}
.card-content{font-size:20px;line-height:1.9;color:var(--text2);}

/* === Grid layouts === */
.four-grid,.two-col,.three-col{display:grid;gap:16px;margin:18px 0;}
.four-grid,.two-col{grid-template-columns:1fr 1fr;}
.three-col{grid-template-columns:1fr 1fr 1fr;}
.col,.col-card,.cell{background:var(--card);border:1px solid var(--border);
  border-radius:8px;padding:18px 22px;}
.col-title{font-family:"Noto Sans TC",sans-serif;font-size:21.5px;
  font-weight:700;color:var(--accent);margin-bottom:10px;}
.col-content{font-size:19px;line-height:1.85;color:var(--text2);}

/* === Flow === */
.flow{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;
  gap:8px;margin:18px 0;padding:18px;background:var(--card);
  border:1px dashed var(--border);border-radius:10px;}
.flow.flow-v{flex-direction:column;}
.flow-box,.flow-step{
  background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--accentL);border-radius:8px;
  padding:14px 22px;text-align:center;
  min-width:180px;max-width:680px;
  font-size:17.5px;font-weight:600;color:var(--text);
  box-shadow:0 1px 4px rgba(91,58,41,.08);}
.flow-box small,.flow-step small{display:block;
  font-family:"Noto Sans TC",sans-serif;font-size:13px;
  font-weight:400;color:var(--text-muted);margin-top:4px;letter-spacing:1px;}
.flow-arrow{font-size:24px;color:var(--gold);font-weight:700;}

/* === Spectrum (光譜) === */
.spectrum{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;
  margin:20px 0;padding:0;align-items:stretch;}
.sp-node{padding:18px 16px;border-radius:10px;text-align:center;
  font-size:16px;line-height:1.6;
  border:1px solid var(--border);background:var(--card);}
.sp-left{background:linear-gradient(135deg,#f5ddd3,#ecc7b8);
  border-color:#c98770;color:#6b3424;}
.sp-mid{background:linear-gradient(135deg,var(--gold),var(--goldL));
  border-color:#9a700a;color:#fff;}
.sp-mid h5,.sp-mid *{color:#fff!important;}
.sp-mid h5{font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,.35);}
.sp-mid small{color:rgba(255,255,255,.92)!important;}
.sp-right{background:linear-gradient(135deg,#dfe8d5,#c1d3a9);
  border-color:#7c9456;color:#2f4519;}
.sp-node h5{font-size:18.5px;margin-bottom:6px;letter-spacing:2px;}
.sp-node small{font-family:"Noto Sans TC",sans-serif;
  font-size:12.5px;letter-spacing:1px;}

/* === Debate (問答辯) === */
.debate{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:18px 0;}
.debate .q-side{background:#eff4fa;border:1px solid #aac0d8;
  border-radius:10px;padding:18px 22px;color:#324d6b;font-size:19px;}
.debate .a-side{background:#fbf2e8;border:1px solid var(--accentL);
  border-radius:10px;padding:18px 22px;color:#6b3a1a;font-size:19px;}
.debate h5{font-family:"Noto Sans TC",sans-serif;font-size:16px;
  letter-spacing:2px;margin-bottom:8px;font-weight:700;}

/* === Triangle === */
.triangle-diagram{display:grid;grid-template-columns:1fr 1fr 1fr;
  gap:12px;margin:18px 0;}
.tri-node{background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:18px 16px;text-align:center;font-size:17px;
  box-shadow:0 1px 4px rgba(91,58,41,.08);}
.tri-node h5{font-size:18.5px;color:var(--accent);
  margin-bottom:8px;letter-spacing:2px;}

/* === Checklist === */
.checklist{margin:14px 0;padding:0;list-style:none;}
.checklist li{font-size:20px;line-height:1.9;
  padding:6px 0 6px 32px;position:relative;}
.checklist li::before{content:"○";position:absolute;left:6px;top:6px;
  color:var(--gold);font-size:18px;font-weight:700;}

/* === Phase badge === */
.phase-badge{display:inline-block;background:var(--gold);color:#fff!important;
  font-family:"Noto Sans TC",sans-serif;font-size:14px;font-weight:700;
  padding:4px 14px;border-radius:14px;letter-spacing:2.5px;margin:4px 6px 4px 0;}

/* === Domino chain === */
.domino-chain{display:flex;flex-wrap:wrap;align-items:center;
  gap:8px;margin:18px 0;padding:14px;
  background:var(--card);border:1px dashed var(--border);border-radius:10px;}
.domino{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
  border:1px solid var(--accentL);border-radius:8px;
  padding:10px 16px;font-size:17px;font-weight:600;}
.chain-arrow{font-size:20px;color:var(--gold);}

/* === Read progress capsule === */
.read-progress{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);
  z-index:120;background:rgba(30,26,20,.92);color:var(--gold);
  padding:9px 24px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);
  box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;
  pointer-events:none;user-select:none;backdrop-filter:blur(6px);
}
.read-progress .rp-bar{width:148px;height:4px;
  background:rgba(212,196,168,.18);border-radius:2px;
  overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;
  background:linear-gradient(90deg,var(--gold),var(--goldL));
  width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}
.read-progress .rp-label{font-size:12px;opacity:.75;letter-spacing:3px;}

/* === Back to top === */
#backTop{position:fixed;right:24px;bottom:70px;
  width:44px;height:44px;border-radius:50%;border:0;
  background:var(--sbBg);color:var(--gold);font-size:22px;
  cursor:pointer;display:none;z-index:130;
  box-shadow:0 4px 12px rgba(0,0,0,.25);}
#backTop.show{display:block;}

/* === Footer === */
.site-footer{background:var(--sbBg);color:var(--sbText);
  padding:40px 30px;text-align:center;margin-top:50px;}
.site-footer p{font-size:15px;line-height:2;margin:6px 0;
  color:rgba(212,196,168,.85);letter-spacing:2px;}
.site-footer .gold-line{font-size:14px;color:var(--gold);
  letter-spacing:6px;margin:14px 0;}

/* === Anchor offset === */
#top{position:absolute;top:0;left:0;width:1px;height:1px;overflow:hidden;}
.chapter{scroll-margin-top:20px;}

/* === Responsive === */
@media (max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .25s;}
  #sb.open{transform:translateX(0);}
  #sbToggle{display:block;}
  .main{margin-left:0;}
  .hero-title{font-size:38px;letter-spacing:4px;}
  .ch-head{padding:36px 18px 30px;}
  .ch-name{font-size:26px;letter-spacing:3px;}
  .ch-body{padding:30px 20px 40px;}
  .four-grid,.two-col,.three-col,.spectrum,.triangle-diagram,.debate{grid-template-columns:1fr;}
  .preface{padding:24px 22px;}
}
@media (max-width:600px){
  body{font-size:17px;}
  .hero-title{font-size:30px;letter-spacing:2px;}
  .ch-body h2{font-size:24px;}
  .ch-body h3{font-size:20px;}
}

/* === 合併模式追加 === */
.preface{max-width:1000px;}
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);
 border:1px solid var(--border);border-left:5px solid var(--gold);
 border-radius:10px;padding:20px 26px;margin:0 0 26px;
 box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);
 background:linear-gradient(135deg,#fdf8e8,#f2e6c8);
 margin-top:30px;margin-bottom:16px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;
 font-size:12.5px;background:var(--gold);color:#fff;
 padding:3px 13px;border-radius:12px;letter-spacing:2.2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.05;font-size:18.5px;}
.ch-frame{display:block;width:100%;border:0;background:#fffdf7;
 border:1px solid var(--border);border-radius:12px;
 box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:200px;}
.next-link{display:inline-flex;align-items:center;gap:8px;
 margin:8px 0 4px;padding:12px 28px;
 background:linear-gradient(135deg,#3d2f1f,#5a4530);color:var(--goldL);
 font-family:"Noto Sans TC",sans-serif;font-size:17px;letter-spacing:1.5px;
 text-decoration:none;border-radius:30px;
 box-shadow:0 3px 12px rgba(91,58,41,.25);transition:all .25s;}
.next-link:hover{transform:translateX(4px);color:#fff;
 box-shadow:0 5px 16px rgba(184,134,11,.45);}
.read-progress{transition:opacity .45s ease,transform .45s ease;}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}
.ch-end-note{text-align:center;font-family:"Noto Sans TC",sans-serif;
 font-size:15px;color:var(--text-muted);letter-spacing:3px;
 margin:30px 0 6px;}

      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
